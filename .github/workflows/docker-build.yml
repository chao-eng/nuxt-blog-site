name: Build and Push Docker Image

on:
  push:
    branches: [ "latest_branch" ]  # 监听 master 和 latest_branch 分支的提交
    # tags: [ "v*" ]      # (可选) 也可以配置打 tag 时触发
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64] # 矩阵分发

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }} # 每次只跑一个平台
          cache-from: type=gha,scope=${{ matrix.platform }} # 分开缓存，防止冲突
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nuxt-blog-site:latest-${{ strategy.job-index }}
            ${{ secrets.DOCKER_USERNAME }}/nuxt-blog-site:${{ github.sha }}-${{ strategy.job-index }}